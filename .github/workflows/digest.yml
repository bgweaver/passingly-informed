name: Daily digest

# WHAT THIS DOES
#   Every morning it runs the generator once, which produces site/index.html and
#   site/digest.json, then publishes that folder to GitHub Pages. One generation
#   a day, shared by every visitor. That "once a day" schedule IS the rate limit
#   that keeps your Groq usage near zero.
#
# DST + timing
#   GitHub cron is UTC only and can't follow daylight saving, and it sometimes
#   delays scheduled runs by a few minutes. 09:00 UTC lands at 5:00am Eastern in
#   summer (EDT) and 4:00am in winter (EST) -- so even with a delay and the
#   minute or two it takes to build, the digest is published well before 6:00am
#   your time, year-round. (Want weekdays only? Use "0 9 * * 1-5".)

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # lets you trigger a run by hand from the Actions tab

# Least privilege: only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# If a manual run overlaps the scheduled one, let the newer finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate today's digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Optional overrides -- set these as repo secrets/variables if you want.
          # Leaving them unset is fine; the page just hides those bits.
          TIP_URL: ${{ vars.TIP_URL }}
          SOURCE_URL: ${{ vars.SOURCE_URL }}
          FORM_ENDPOINT: ${{ secrets.FORM_ENDPOINT }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
        run: python3 passingly_informed.py --build ./site

      # The daily rebuild republishes ./site wholesale. GitHub's custom-domain
      # marker is a CNAME file inside the published folder; if it's missing, a
      # deploy can silently unset the domain. So write it every run. Change this
      # one line if the domain ever changes.
      - name: Keep custom domain on every deploy
        run: echo "www.passinglyinformed.com" > ./site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
