name: Daily digest

# WHAT THIS DOES
#   Runs the generator once -- producing site/index.html and site/digest.json --
#   then publishes that folder to GitHub Pages. One generation per run, shared by
#   every visitor. That "once a run" cadence IS the rate limit that keeps Groq
#   usage near zero.
#
# WHAT TRIGGERS IT
#   A container on your homelab (the "pusher" CT) fires this every morning at
#   05:00 your LOCAL time, via the GitHub API (workflow_dispatch). That's the real
#   schedule now: precise, follows DST on its own, and skips GitHub's cron-queue
#   delay (which is why we moved off the built-in schedule). If a dispatch ever
#   fails, the CT pings Iris.
#
#   There is intentionally NO GitHub `schedule:` cron here. If you ever want a
#   built-in fallback for "the CT is down," add a schedule block like:
#       schedule:
#         - cron: "0 11 * * *"   # ~07:00 EDT / 06:00 EST
#   ...but know it rebuilds every day ON TOP of the CT's run -- a redundant
#   double-build by design. Leave it out unless you actually want that.

on:
  workflow_dispatch: {}   # triggered by the pusher CT (or by hand from the Actions tab)

# Least privilege: pages deploy + committing the day's archive file back.
permissions:
  contents: write
  pages: write
  id-token: write

# If a dispatched run overlaps a hand-triggered one, let the newer finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate today's digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Optional overrides -- set as repo secrets/variables if you want.
          # Leaving them unset is fine; the page just hides those bits.
          TIP_URL: ${{ vars.TIP_URL }}
          SOURCE_URL: ${{ vars.SOURCE_URL }}
          FORM_ENDPOINT: ${{ secrets.FORM_ENDPOINT }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
        run: python3 passingly_informed.py --build ./site

      # Persist today's digest into the repo so the site can flip back a few days.
      # data/digests is the only thing that survives between runs; ./site is
      # rebuilt from it each morning. Non-fatal: a push hiccup never blocks the
      # deploy, it just means that one day isn't archived.
      - name: Persist archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/digests
          git commit -m "archive: $(date -u +%F)" || { echo "nothing to commit"; exit 0; }
          git push || echo "push failed -- archive not persisted this run"

      # The daily rebuild republishes ./site wholesale. GitHub's custom-domain
      # marker is a CNAME file inside the published folder; if it's missing, a
      # deploy can silently unset the domain. So write it every run. It must be
      # the BARE hostname -- no scheme, no markdown, one line.
      - name: Keep custom domain on every deploy
        run: echo "www.passinglyinformed.com" > ./site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
